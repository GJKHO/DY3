        #tg-ad-layer {

            border: none;

            cursor: pointer;
            display: none;

        #tg-score-toast {
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 8px #000;
            display: none;
            animation: floatUp 1.2s ease forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

    <script>
        // SDK sets window.visitorId="null" which causes dynamic import('./fingerprint2.min.js')
        // to fail (wrong relative path), leaving YaGames.init() promise unresolved (black screen).
        // Override with a stable local ID to skip fingerprint loading.
        if (window.visitorId === "null") {
            window.visitorId = "local_" + (localStorage.getItem("_vid") || (function() {
                var id = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
                localStorage.setItem("_vid", id);
                return id;
            })());
        }
    </script>

    <!-- ========== Adsgram 广告层 ========== -->
    <div id="tg-ad-layer">
        <div id="tg-score-toast">+200分</div>
        <button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 看广告 +200分</button>
    </div>

    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script>
    (function () {
        // 初始化 Telegram WebApp
        window.Telegram && window.Telegram.WebApp && (
            window.Telegram.WebApp.ready(),
            window.Telegram.WebApp.expand()
        );

        var AdController    = null;
        var IntAdController = null;
        var intAdInterval   = null;

        // 从 ID.txt 读取广告 Block ID，格式：KEY=VALUE，每行一条，# 开头为注释
        function loadConfig(cb) {
            fetch('ID.txt?_=' + Date.now())
                .then(function (r) { return r.text(); })
                .then(function (text) {
                    var cfg = {};
                    text.split('\n').forEach(function (line) {
                        var trimmed = line.trim();
                        if (!trimmed || trimmed.charAt(0) === '#') return;
                        var parts = trimmed.split('=');
                        if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
                    });
                    cb(cfg);
                })
                .catch(function () { cb({}); });
        }

        function initAds(cfg) {
            if (!window.Adsgram) return;
            var rewardId = cfg['REWARD_BLOCK_ID'] || '';
            var intId    = cfg['INT_BLOCK_ID']    || '';
            try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch(e) {}
            try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch(e) {}

            // 显示激励广告按钮
            if (AdController) {
                document.getElementById('tg-reward-btn').style.display = 'block';
            }
            // 启动插屏广告定时器
            startIntAdTimer();
        }

        function waitAndInit(cfg) {
            if (window.Adsgram) {
                initAds(cfg);
            } else {
                var sdkCheck = setInterval(function () {
                    if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
                }, 300);
            }
        }

        // 先读配置，再初始化广告
        loadConfig(function (cfg) { waitAndInit(cfg); });

        // ——— 激励广告：用户主动点击，看完 +200分 ———
        window.tgShowRewardAd = function () {
            if (!AdController) return;
            var btn = document.getElementById('tg-reward-btn');
            btn.disabled = true;
            AdController.show().then(function () {
                // 通知游戏加分（游戏脚本可覆盖 window.onAdsgramReward）
                if (typeof window.onAdsgramReward === 'function') {
                    window.onAdsgramReward(200);
                }
                // 浮动 +200分 提示
                var toast = document.getElementById('tg-score-toast');
                toast.style.display = 'block';
                toast.style.animation = 'none';
                setTimeout(function () {
                    toast.style.animation = 'floatUp 1.2s ease forwards';
                    setTimeout(function () { toast.style.display = 'none'; }, 1200);
                }, 20);
                // 60秒冷却
                var cd = 60;
                btn.textContent = '⏳ ' + cd + 's';
                var cdTimer = setInterval(function () {
                    cd--;
                    if (cd <= 0) {
                        clearInterval(cdTimer);
                        btn.disabled = false;
                        btn.textContent = '📺 看广告 +200分';
                    } else {
                        btn.textContent = '⏳ ' + cd + 's';
                    }
                }, 1000);
            }).catch(function () {
                btn.disabled = false;
            });
        };

        // ——— 插屏广告：每30秒自动弹出 ———
        function startIntAdTimer() {
            clearIntAdTimer();
            intAdInterval = setInterval(function () {
                if (!IntAdController) return;
                IntAdController.show().then(function () {}).catch(function () {});
            }, 30000);
        }

        function clearIntAdTimer() {
            if (intAdInterval) {
                clearInterval(intAdInterval);
                intAdInterval = null;
            }
        }
    })();
    </script>
